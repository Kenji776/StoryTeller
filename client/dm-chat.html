<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Cormorant+Garamond:wght@400;600&display=swap" rel="stylesheet" />
	<title>Ask the DM</title>
	<style>
		body {
			background: radial-gradient(circle at top, #0d0b15, #05030b 60%, #000 100%);
			color: #f3ede2;
			font-family: "Cinzel", "Cormorant Garamond", serif;
			margin: 0;
			display: flex;
			flex-direction: column;
			height: 100vh;
			overflow: hidden;
		}

		/* === HEADER === */
		.header {
			padding: 0.6em 1em;
			border-bottom: 1px solid rgba(150, 120, 60, 0.3);
			background: rgba(15, 10, 25, 0.9);
			text-align: center;
		}
		.header h2 {
			margin: 0;
			font-family: "Cinzel", serif;
			font-size: 1.1em;
			color: #eacb83;
		}
		.header p {
			margin: 0.25em 0 0;
			font-size: 0.75em;
			color: #888;
		}

		/* === CHAT LOG === */
		#chatLog {
			flex: 1;
			overflow-y: auto;
			padding: 1em;
			display: flex;
			flex-direction: column;
			gap: 0.6em;
			background: rgba(20, 15, 35, 0.9);
		}
		.msg {
			padding: 0.6em 0.85em;
			border-radius: 8px;
			font-size: 0.95em;
			line-height: 1.5;
			max-width: 85%;
			animation: fadeIn 0.25s ease-out;
		}
		.msg-player {
			background: rgba(80, 120, 200, 0.15);
			border: 1px solid rgba(80, 120, 200, 0.25);
			align-self: flex-end;
			color: #bcd;
		}
		.msg-dm {
			background: rgba(100, 80, 180, 0.15);
			border: 1px solid rgba(100, 80, 180, 0.25);
			align-self: flex-start;
			color: #ddd;
		}
		.msg-typing {
			opacity: 0.5;
			animation: pulse 1.2s ease-in-out infinite;
		}
		@keyframes pulse {
			0%, 100% { opacity: 0.3; }
			50% { opacity: 0.7; }
		}
		@keyframes fadeIn {
			from { opacity: 0; transform: translateY(6px); }
			to { opacity: 1; transform: translateY(0); }
		}

		/* === INPUT BAR === */
		.input-bar {
			display: flex;
			gap: 8px;
			padding: 0.7em 1em;
			border-top: 1px solid rgba(150, 120, 60, 0.3);
			background: rgba(15, 10, 25, 0.95);
		}
		.input-bar input {
			flex: 1;
			padding: 0.55em 0.75em;
			border: 1px solid rgba(150, 120, 60, 0.3);
			border-radius: 6px;
			background: rgba(30, 25, 50, 0.8);
			color: #f3ede2;
			font-family: inherit;
			font-size: 0.9em;
			outline: none;
		}
		.input-bar input:focus {
			border-color: rgba(150, 120, 60, 0.6);
		}
		.input-bar input::placeholder {
			color: #666;
		}
		.input-bar button {
			padding: 0.55em 1.2em;
			border: none;
			border-radius: 6px;
			background: linear-gradient(135deg, #6a5acd, #483d8b);
			color: #fff;
			font-family: "Cinzel", serif;
			font-size: 0.85em;
			cursor: pointer;
			transition: opacity 0.2s;
		}
		.input-bar button:hover { opacity: 0.85; }
		.input-bar button:disabled { opacity: 0.4; cursor: default; }
	</style>
</head>
<body>
	<div class="header">
		<h2>Ask the Dungeon Master</h2>
		<p>Ask about the campaign, story, goals, or rules. This won't affect the game.</p>
	</div>

	<div id="chatLog"></div>

	<div class="input-bar">
		<input type="text" id="chatInput" placeholder="What should I be doing right now?" maxlength="500" autofocus />
		<button id="sendBtn">Ask</button>
	</div>

	<script src="/socket.io/socket.io.js"></script>
	<script>
		const socket = io();
		const params = new URLSearchParams(window.location.search);
		const lobbyId = params.get("lobbyId");
		const playerName = params.get("name") || "Player";

		const chatLog = document.getElementById("chatLog");
		const chatInput = document.getElementById("chatInput");
		const sendBtn = document.getElementById("sendBtn");

		// No room join — this is a lightweight popup. We pass lobbyId
		// and playerName with each request to avoid triggering
		// disconnect/player-left logic when the window closes.

		function addMsg(cls, label, text) {
			const div = document.createElement("div");
			div.className = "msg " + cls;
			div.innerHTML = "<strong>" + label + "</strong> " + text;
			chatLog.appendChild(div);
			chatLog.scrollTop = chatLog.scrollHeight;
			return div;
		}

		let typingEl = null;

		function sendQuestion() {
			const q = chatInput.value.trim();
			if (!q || !lobbyId) return;

			addMsg("msg-player", "You:", q.replace(/</g, "&lt;").replace(/>/g, "&gt;"));
			typingEl = addMsg("msg-dm msg-typing", "", "<em>The DM is thinking...</em>");
			chatInput.value = "";
			sendBtn.disabled = true;

			socket.emit("dm:chat", { lobbyId, playerName, question: q });
		}

		sendBtn.addEventListener("click", sendQuestion);
		chatInput.addEventListener("keydown", (e) => {
			if (e.key === "Enter" && !e.shiftKey) {
				e.preventDefault();
				sendQuestion();
			}
		});

		socket.on("dm:chat:reply", ({ question, answer }) => {
			if (typingEl) { typingEl.remove(); typingEl = null; }
			const safe = answer.replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/\n/g, "<br>");
			addMsg("msg-dm", "DM:", safe);
			sendBtn.disabled = false;
			chatInput.focus();
		});
	</script>
</body>
</html>
